<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Login Dashboard - AskAnyProject</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Hide scrollbar for clean UI but keep functionality */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300 font-sans">
    
    <!-- Navbar -->
    <header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between max-w-6xl">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold text-xl">A</div>
                <span class="font-semibold text-lg tracking-tight">AskAnyProject</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors focus:outline-none" aria-label="Toggle Dark Mode">
                    <!-- Sun Icon (Hidden in Light Mode) -->
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 2.32a1 1 0 011.415 0l.708.707a1 1 0 01-1.414 1.415l-.707-.708a1 1 0 010-1.414zm3.78 4.68a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm14.535 5.28a1 1 0 010 1.415l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM10 15a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-5.636-2.95a1 1 0 011.414 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM4.464 4.464a1 1 0 011.414 0l.707.707a1 1 0 01-1.414 1.415L4.464 5.88a1 1 0 010-1.415z" clip-rule="evenodd"></path>
                    </svg>
                    <!-- Moon Icon (Hidden in Dark Mode) -->
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-slate-700" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>
                <a href="index.html" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Sign Out</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-12 max-w-5xl">
        
        <!-- Search Section -->
        <div class="flex flex-col items-center mb-16 text-center">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-slate-900 dark:text-white">Research & Analyze</h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 mb-8 max-w-2xl">Enter any topic below. Our system will crawl the web, synthesize the data, and generate a comprehensive overview.</p>
            
            <form id="search-form" class="w-full max-w-3xl relative">
                <div class="relative flex items-center shadow-lg rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-transparent transition-all">
                    <div class="pl-4 text-slate-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="topic-input"
                        class="w-full py-5 px-4 bg-transparent outline-none text-slate-900 dark:text-white text-lg placeholder-slate-400"
                        placeholder="Enter Content Topic (e.g., Quantum Computing Advancements)"
                        required
                        autocomplete="off"
                    >
                    <button 
                        type="submit" 
                        class="hidden md:flex absolute right-2 py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors items-center gap-2"
                    >
                        Search & Analyze
                    </button>
                </div>
                <!-- Mobile button -->
                <button 
                    type="submit" 
                    class="md:hidden w-full mt-4 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-2xl shadow-lg transition-colors"
                >
                    Search & Analyze
                </button>
            </form>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-state" class="hidden flex-col items-center justify-center py-12">
            <svg class="animate-spin -ml-1 mr-3 h-12 w-12 text-indigo-600 dark:text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-4 text-slate-600 dark:text-slate-400 font-medium animate-pulse text-lg">Synthesizing information...</p>
        </div>

        <!-- Results Section -->
        <div id="results-container" class="hidden opacity-0">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2">
                    Analysis Results for: <span id="topic-display" class="text-indigo-600 dark:text-indigo-400 font-semibold"></span>
                </h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- A: Executive Summary -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 md:col-span-2">
                    <div class="flex items-center gap-3 mb-4 text-indigo-600 dark:text-indigo-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Executive Summary</h3>
                    </div>
                    <p id="executive-summary" class="text-slate-600 dark:text-slate-300 leading-relaxed">
                        <!-- Content injected via JS -->
                    </p>
                </div>

                <!-- B: Key Facts & Data Points -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
                    <div class="flex items-center gap-3 mb-4 text-amber-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Key Facts & Data Points</h3>
                    </div>
                    <ul id="key-facts" class="space-y-3 text-slate-600 dark:text-slate-300">
                        <!-- Content injected via JS -->
                    </ul>
                </div>

                <!-- C: Related Sub-topics & Trends -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
                    <div class="flex items-center gap-3 mb-4 text-emerald-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Related Trends</h3>
                    </div>
                    <div id="trends-tags" class="flex flex-wrap gap-2">
                        <!-- Content injected via JS -->
                    </div>
                </div>

                <!-- D: Source Links -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 md:col-span-2">
                    <div class="flex items-center gap-3 mb-4 text-sky-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Source Links</h3>
                    </div>
                    <div id="source-links" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Content injected via JS -->
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script src="dashboard.js"></script>
</body>
</html>
